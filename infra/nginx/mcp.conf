server {
    listen 80;
    listen [::]:80;
    server_name mcp.matrummet.se;

    # Allow acme.sh webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mcp.matrummet.se;

    ssl_certificate /home/jonas/.acme.sh/mcp.matrummet.se_ecc/fullchain.cer;
    ssl_certificate_key /home/jonas/.acme.sh/mcp.matrummet.se_ecc/mcp.matrummet.se.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers (server-level, inherited by location blocks without add_header)
    include /etc/nginx/snippets/matrummet-security-headers.conf;

    # Tool-call args can carry base64 image uploads.
    client_max_body_size 30m;

    # Friendly root — the service returns a JSON pointer to the MCP endpoint
    # (so a browser/human hitting the bare domain isn't a dead 404).
    location = / {
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth discovery metadata (RFC 8414 / RFC 9728) — default buffered proxy.
    location /.well-known/ {
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Throttle the credential-checking login POST/GET (per client IP). Exact-match
    # location wins over the regex group below.
    location = /login {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth endpoints — default buffered proxy.
    location ~ ^/(authorize|token|register|revoke)$ {
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Streamable-HTTP / SSE endpoint — modeled on the ai-review streaming
    # stanza in shared-locations.conf (no buffering, long timeouts).
    location /mcp {
        proxy_pass http://127.0.0.1:4008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # Health check - external monitoring (Uptime Kuma)
    location = /health/mcp {
        proxy_pass http://127.0.0.1:4008/health;
    }
}
